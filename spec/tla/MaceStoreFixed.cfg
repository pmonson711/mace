\* TLC configuration for MaceStoreFixed model — all invariants with fixes applied
\*
\* Fixes:
\*   1. Cache flushed on termination (NoStaleCache)
\*   2. FetchRaw fallthrough — continues walk when ancestor lacks the key
\*      (LinkInheritance, MonitorInheritance, NoFalseNegatives)
\*
\* Run with: make MaceStoreFixed.cfg

SPECIFICATION Spec

CONSTANTS
  Pids   = {p1, p2, p3}
  Apps   = {a1}
  Keys   = {k1, k2}
  Values = {v1, v2}

INVARIANTS
  TypeOK
  LinkInheritance
  MonitorInheritance
  Isolation
  NoFalseNegatives
  TerminationPermanent
  NoStaleCache
