\* TLC configuration for MaceStoreETS model — ETS-backed config storage
\* Fixes: fallthrough fetch + monitor-based config/cache cleanup on DOWN
\*
\* Run with: make MaceStoreETS.cfg

SPECIFICATION Spec

CONSTANTS
  Pids   = {p1, p2, p3}
  Apps   = {a1}
  Keys   = {k1, k2}
  Values = {v1, v2}

INVARIANTS
  TypeOK
  LinkInheritance
  MonitorInheritance
  Isolation
  NoFalseNegatives
  TerminationPermanent
  NoStaleCache
